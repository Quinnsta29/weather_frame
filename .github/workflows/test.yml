name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Force the inky-free code path; CI has no Raspberry Pi e-ink hardware.
      DEBUG_MODE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project (dev extras, no [pi])
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=weather_frame --cov-report=term-missing
